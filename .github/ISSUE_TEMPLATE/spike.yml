name: "🔬 Spike / Research"
description: "Time-boxed investigation or proof of concept"
title: "[Spike] "
labels:
  - "type: spike"
assignees:
  - "AntHanna23"

body:
  - type: markdown
    attributes:
      value: |
        Spikes are time-boxed research tasks. The output is a **decision or design doc**, not production code.
        > **Routing:** Set **Milestone** and **Assignee** in the sidebar. Default: `Backlog` / `AntHanna23`.

  - type: textarea
    id: question
    attributes:
      label: "Research Question"
      description: "What specific question does this spike need to answer?"
      placeholder: "e.g. What is the best approach for integrating Home Assistant webhooks?"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      description: "What deliverable marks this spike as done? (Usually a doc, decision, or follow-up issues.)"
      placeholder: |
        - [ ] Decision doc written covering X, Y, Z
        - [ ] Follow-up implementation issues created
        - [ ] Key risks identified
    validations:
      required: true

  - type: input
    id: timebox
    attributes:
      label: "Timebox"
      description: "Max time to spend before forcing a decision."
      placeholder: "e.g. 2 days / 1 sprint"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options:
        - "area: api"
        - "area: backend"
        - "area: frontend"
        - "area: infra"
        - "area: database"
        - "area: build"
        - "multiple"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > Priority, risk, owner, and weight are assigned during triage. Run `.github/skills/triage.md` after submitting.

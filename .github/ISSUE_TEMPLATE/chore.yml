name: "🔧 Chore / Maintenance"
description: "Dependency updates, config changes, cleanup, CI fixes"
title: "[Chore] "
labels:
  - "type: chore"
assignees:
  - "AntHanna23"

body:
  - type: markdown
    attributes:
      value: |
        > **Routing:** Set **Milestone** and **Assignee** in the sidebar. Default: `Backlog` / `AntHanna23`.

  - type: textarea
    id: description
    attributes:
      label: "What needs to be done?"
      description: "Describe the maintenance task and why it's needed."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options:
        - "area: build"
        - "area: infra"
        - "area: backend"
        - "area: frontend"
        - "area: database"
        - "area: testing"
        - "multiple"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > Priority, risk, owner, and weight are assigned during triage. Run `.github/skills/triage.md` after submitting.

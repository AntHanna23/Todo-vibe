name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    name: Set default milestone and assignee
    runs-on: ubuntu-latest

    steps:
      - name: Set default milestone (Backlog)
        if: ${{ !github.event.issue.milestone }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Look up the milestone named "Backlog"
          MILESTONE_NUMBER=$(gh api "repos/$REPO/milestones" \
            --jq '.[] | select(.title == "Backlog") | .number' 2>/dev/null || true)

          if [ -z "$MILESTONE_NUMBER" ]; then
            echo "::warning::Milestone 'Backlog' not found in $REPO. " \
              "Create it at https://github.com/$REPO/milestones/new and re-run triage."
          else
            gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
              --method PATCH \
              --field milestone="$MILESTONE_NUMBER"
            echo "Set milestone to 'Backlog' (milestone #$MILESTONE_NUMBER) on issue #$ISSUE_NUMBER."
          fi

      - name: Set default assignee (AntHanna23)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ASSIGNEE_COUNT=$(echo '${{ toJson(github.event.issue.assignees) }}' | jq 'length')
          if [ "$ASSIGNEE_COUNT" -eq 0 ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --repo "$REPO" \
              --add-assignee "AntHanna23"
            echo "Assigned issue #$ISSUE_NUMBER to AntHanna23."
          else
            echo "Issue #$ISSUE_NUMBER already has assignees — skipping."
          fi
